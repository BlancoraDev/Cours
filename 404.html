<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error 404 | Página no encontrada</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    color:white;
    overflow:hidden;
}

.container{
    text-align:center;
    padding:40px;
    max-width:700px;
}

.error{
    font-size:9rem;
    font-weight:800;
    background:linear-gradient(45deg,#38bdf8,#818cf8,#ec4899);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:float 3s ease-in-out infinite;
}

h1{
    font-size:2rem;
    margin-bottom:15px;
}

p{
    color:#cbd5e1;
    font-size:1.1rem;
    line-height:1.7;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    text-decoration:none;
    padding:14px 28px;
    border-radius:12px;
    background:#38bdf8;
    color:white;
    font-weight:600;
    transition:.3s;
}

.btn:hover{
    background:#0ea5e9;
    transform:translateY(-3px);
}

.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,.05);
    animation:move 15s linear infinite;
}

.circle:nth-child(1){
    width:200px;
    height:200px;
    left:-50px;
    top:-50px;
}

.circle:nth-child(2){
    width:300px;
    height:300px;
    right:-100px;
    bottom:-100px;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

@keyframes move{
    from{
        transform:rotate(0deg) translateX(20px) rotate(0deg);
    }
    to{
        transform:rotate(360deg) translateX(20px) rotate(-360deg);
    }
}
</style>
</head>

<body>

<div class="circle"></div>
<div class="circle"></div>

<div class="container">
    <div class="error">404</div>

    <h1>Oops... Página no encontrada</h1>

    <p>
        Parece que el archivo o enlace que buscas no existe,
        fue movido o eliminaste la URL por accidente.
    </p>

    <a href="/" class="btn">🏠 Volver al inicio</a>
</div>

</body>
</html>
